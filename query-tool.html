<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查询工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #FF6B6B 0%, #FFB347 50%, #FF8C69 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    
    .wrapper {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.5s ease-in;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .instruction {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.75rem;
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.6;
      font-weight: 300;
      letter-spacing: 0.5px;
    }
    
    .input-box {
      width: 100%;
      margin-bottom: 2rem;
    }
    
    input {
      width: 100%;
      padding: 1.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    input:focus {
      outline: none;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.16);
      background: white;
      transform: translateY(-2px);
    }
    
    input::placeholder {
      color: #aaa;
      font-weight: 400;
    }
    
    .answer-container {
      width: 100%;
      min-height: 200px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    #answer {
      color: #333;
      font-size: 0.95rem;
      line-height: 2;
      word-break: break-word;
      white-space: pre-wrap;
      text-align: left;
      width: 100%;
      max-height: 60vh;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    
    #answer::-webkit-scrollbar {
      width: 6px;
    }
    
    #answer::-webkit-scrollbar-track {
      background: transparent;
    }
    
    #answer::-webkit-scrollbar-thumb {
      background: rgba(255, 107, 107, 0.3);
      border-radius: 3px;
    }
    
    #answer::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 107, 107, 0.5);
    }
    
    .empty-state {
      color: #999;
      font-size: 1rem;
      font-style: italic;
      font-weight: 300;
    }
    
    .error-state {
      color: #FF6B6B;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.6;
    }
    
    .info-tag {
      display: inline-block;
      background: linear-gradient(135deg, #FF6B6B 0%, #FFB347 100%);
      color: white;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      margin-top: 1rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    
    /* 响应式设计 */
    @media (max-width: 480px) {
      body {
        padding: 1rem;
      }
      
      .wrapper {
        max-width: 100%;
      }
      
      .instruction {
        font-size: 0.7rem;
        margin-bottom: 1.5rem;
      }
      
      input {
        font-size: 0.95rem;
        padding: 1rem;
      }
      
      .answer-container {
        min-height: 180px;
        padding: 1.2rem;
      }
      
      #answer {
        font-size: 0.9rem;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>

      如：iphone17 或 iphone17/iphone16pro

    function getAnswer(cmd) {
      const trimmedCmd = cmd.trim().toLowerCase().replace(/\s+/g, '');
      
      if (trimmedCmd.includes('/')) {
        return getIntersectionAnswer(trimmedCmd);
      }
      
      if (answers[trimmedCmd]) {
        return answers[trimmedCmd];
      }
      return null;
    }

    function getIntersectionAnswer(cmd) {
      const commands = cmd.split('/').map(c => c.trim()).filter(c => c);
      
      for (const command of commands) {
        if (!answers[command]) {
          return null;
        }
      }
      
      if (commands.length === 1) {
        return answers[commands[0]];
      }
      
      let result = new Set(answers[commands[0]].split('\n'));
      
      for (let i = 1; i < commands.length; i++) {
        const currentAnswers = new Set(answers[commands[i]].split('\n'));
        result = new Set([...result].filter(item => currentAnswers.has(item)));
      }
      
      const firstList = answers[commands[0]].split('\n');
      const resultArray = firstList.filter(item => result.has(item));
      
      return resultArray.length > 0 ? resultArray.join('\n') : null;
    }

    function showAnswer() {
      const cmd = document.getElementById('cmdInput').value.trim();
      const answerDiv = document.getElementById('answer');
      const infoTag = document.getElementById('infoTag');
      
      if (!cmd) {
        answerDiv.textContent = '输入指令后，结果将显示在这里';
        answerDiv.className = 'empty-state';
        infoTag.innerHTML = '';
        return;
      }

      const result = getAnswer(cmd);
      if (result) {
        answerDiv.textContent = result;
        answerDiv.className = '';
        
        if (cmd.includes('/')) {
          const commands = cmd.split('/').length;
          infoTag.innerHTML = `<div class="info-tag">共同项 · ${commands}个指令</div>`;
        } else {
          infoTag.innerHTML = '';
        }
      } else {
        if (cmd.includes('/')) {
          answerDiv.textContent = '❌ 查询失败\n检查指令是否存在或无共同项';
        } else {
          answerDiv.textContent = `❌ 未找到"${cmd}"`;
        }
        answerDiv.className = 'error-state';
        infoTag.innerHTML = '';
      }
    }

    // 支持 URL 参数
    const urlParams = new URLSearchParams(window.location.search);
    const q = urlParams.get('q');
    if (q) {
      document.getElementById('cmdInput').value = q;
      showAnswer();
    }

    // 支持回车键和实时查询
    const input = document.getElementById('cmdInput');
    input.addEventListener('keyup', showAnswer);
    input.addEventListener('input', showAnswer);
  </script>
